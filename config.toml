# Markdown renderer
[markup]
    defaultMarkdownHandler = "goldmark"
    [markup.goldmark]
        [markup.goldmark.renderer]
            unsafe = true
    [markup.tableOfContents]
        startLevel = 1
        endLevel = 3
        ordered = true

[outputFormats.SearchIndex]
    mediaType = "application/json"
    baseName = "search"

# Hugo’s output control
[outputs]
    home = ["HTML", "RSS", "SearchIndex"]
   